name: workshop-gebrauchtwagen

services:
  app:
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: workshop-server:latest
    container_name: workshop-gebrauchtwagen-app
    profiles: ["app"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ADDR: ":3000"
      DATABASE_URL: postgres://gebrauchtwagen:gebrauchtwagen@db:5432/gebrauchtwagen?sslmode=disable
      RESET_DATABASE_ON_START: "${RESET_DATABASE_ON_START:-true}"
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    ports:
      - "${APP_PORT:-3000}:3000"

  db:
    image: postgres:17
    container_name: workshop-gebrauchtwagen-db
    environment:
      POSTGRES_DB: gebrauchtwagen
      POSTGRES_USER: gebrauchtwagen
      POSTGRES_PASSWORD: gebrauchtwagen
    ports:
      - "5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gebrauchtwagen -d gebrauchtwagen"]
      interval: 10s
      timeout: 5s
      retries: 5
