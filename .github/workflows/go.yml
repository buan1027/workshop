name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v5

      - name: Go einrichten
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Formatierung pruefen
        run: test -z "$(gofmt -l .)"

      - name: Tests ausfuehren
        run: go test ./...
