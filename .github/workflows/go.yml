name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -buildvcs=false

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v5

      - name: Go einrichten
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Formatierung pruefen
        run: test -z "$(gofmt -l .)"

      - name: Statische Analyse mit go vet
        run: go vet ./...

      - name: Statische Analyse mit Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

      - name: Tests ausfuehren
        run: go test ./...

      - name: Sicherheitsanalyse mit govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
